<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Magic Caster Wand Fluid Effects Canvas</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: fixed;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .status {
        position: fixed;
        left: 16px;
        top: 14px;
        z-index: 1;
        color: rgba(255, 255, 255, 0.72);
        font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
        pointer-events: none;
      }

      .spell {
        position: fixed;
        left: 50%;
        top: 18px;
        transform: translateX(-50%);
        z-index: 1;
        color: rgba(255, 216, 80, 0.95);
        font: 700 24px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 0 14px rgba(255, 180, 0, 0.55);
        pointer-events: none;
        transition: opacity 900ms ease;
      }

      .debug {
        position: fixed;
        left: 16px;
        bottom: 14px;
        z-index: 1;
        color: rgba(255, 255, 255, 0.5);
        font: 11px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
        pointer-events: none;
      }

      #mcw-fluid-controls {
        position: fixed;
        right: 14px;
        top: 14px;
        z-index: 2;
        width: min(300px, calc(100vw - 28px));
        max-height: calc(100vh - 28px);
        overflow: auto;
        padding: 12px;
        color: rgba(255, 255, 255, 0.86);
        background: rgba(0, 0, 0, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .fluid-controls-header {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        font-weight: 700;
        text-transform: uppercase;
      }

      .fluid-collapse-button {
        width: 24px;
        height: 24px;
        padding: 0;
        color: white;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 4px;
        font: 700 16px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #mcw-fluid-controls.is-collapsed {
        width: auto;
        padding: 6px;
      }

      #mcw-fluid-controls.is-collapsed .fluid-controls-header span {
        display: none;
      }

      #mcw-fluid-controls.is-collapsed .fluid-controls-body {
        display: none;
      }

      .fluid-control-section {
        --section-color: rgba(255, 255, 255, 0.55);
        margin-top: 10px;
        padding: 8px 8px 4px;
        border-left: 3px solid var(--section-color);
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
      }

      .fluid-control-section-title {
        margin-bottom: 6px;
        color: var(--section-color);
        font-weight: 700;
        text-transform: uppercase;
      }

      .fluid-control-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        align-items: center;
        margin: 8px 0;
      }

      .fluid-control-row input[type="range"] {
        grid-column: 1 / -1;
        width: 100%;
        accent-color: var(--section-color);
      }

      .fluid-control-row input[type="checkbox"],
      .fluid-control-row select {
        accent-color: var(--section-color);
      }

      .fluid-control-row input[type="checkbox"] {
        appearance: none;
        width: 16px;
        height: 16px;
        display: grid;
        place-items: center;
        background: white;
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: 3px;
      }

      .fluid-control-row input[type="checkbox"]::before {
        content: "";
        width: 9px;
        height: 5px;
        border-left: 2px solid #000;
        border-bottom: 2px solid #000;
        transform: rotate(-45deg) scale(0);
      }

      .fluid-control-row input[type="checkbox"]:checked::before {
        transform: rotate(-45deg) scale(1);
      }

      .fluid-control-row select {
        min-width: 116px;
        color: white;
        background: rgba(0, 0, 0, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
        padding: 4px 6px;
      }

      .fluid-control-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .fluid-section-grey { --section-color: #aeb4bd; }
      .fluid-section-blue { --section-color: #58a6ff; }
      .fluid-section-white { --section-color: #ffffff; }
      .fluid-section-green { --section-color: #46d779; }
      .fluid-section-yellow { --section-color: #f4d35e; }

      .fluid-control-actions button {
        flex: 1;
        min-height: 30px;
        color: white;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
      }
    </style>
    <script>
      window.MCW_FLUID_ENTRY_ID = __MCW_ENTRY_ID__;
      window.MCW_FLUID_EVENTS_URL = __MCW_EVENTS_URL__;
      window.MCW_FLUID_STATE_URL = __MCW_STATE_URL__;
      window.MCW_FLUID_CONFIG_URL = __MCW_CONFIG_URL__;
      window.MCW_FLUID_DEFAULT_STATE_URL = "/magic_caster_wand_fluid/fluid_state";
      window.MCW_FLUID_CONFIG = __MCW_FLUID_CONFIG__;
    </script>
  </head>
  <body>
    <div class="status" id="mcw-fluid-status">READY</div>
    <div class="spell" id="mcw-fluid-spell"></div>
    <div class="debug" id="mcw-fluid-debug">WAITING FOR WAND DATA</div>
    <canvas></canvas>
    <script src="__MCW_STATIC_URL__/script.js"></script>
  </body>
</html>
