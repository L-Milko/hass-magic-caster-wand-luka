<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Magic Caster Wand Fluid Effects Canvas</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: fixed;
      }

      canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        transition: left 220ms ease, width 220ms ease, height 220ms ease, bottom 220ms ease;
      }

      .status {
        position: fixed;
        left: 16px;
        top: 14px;
        z-index: 1;
        color: rgba(255, 255, 255, 0.72);
        font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
        pointer-events: none;
        transition: left 220ms ease, bottom 220ms ease;
      }

      .spell {
        position: fixed;
        left: 50%;
        top: 18px;
        transform: translateX(-50%);
        z-index: 1;
        color: #7ce7ff;
        background: linear-gradient(90deg, #d9fcff 0%, #74ddff 38%, #8bb6ff 70%, #f1fbff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        font: 700 24px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-align: center;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        text-shadow: 0 0 14px rgba(70, 190, 255, 0.58), 0 0 32px rgba(80, 120, 255, 0.32);
        pointer-events: none;
        transition: opacity 900ms ease;
      }

      .spell.is-cast-pulse {
        animation: spell-cast-pulse 760ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .spell.is-avada.is-cast-pulse {
        animation: spell-avada-cast-pulse 920ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      @keyframes spell-cast-pulse {
        0% {
          transform: translateX(-50%) scale(1.09);
          filter: drop-shadow(0 0 16px rgba(120, 225, 255, 0.62));
        }
        100% {
          transform: translateX(-50%) scale(1);
          filter: drop-shadow(0 0 0 rgba(120, 225, 255, 0));
        }
      }

      @keyframes spell-avada-cast-pulse {
        0% {
          transform: translateX(-50%) scale(1.055);
          filter: drop-shadow(0 0 16px rgba(118, 255, 70, 0.82)) drop-shadow(0 0 36px rgba(42, 255, 88, 0.48));
        }
        100% {
          transform: translateX(-50%) scale(1);
          filter: drop-shadow(0 0 10px rgba(122, 255, 77, 0.6));
        }
      }

      .spell.is-learning {
        color: rgba(255, 216, 80, 0.95);
        background: none;
        -webkit-text-fill-color: rgba(255, 216, 80, 0.95);
        text-shadow: 0 0 14px rgba(255, 180, 0, 0.55);
      }

      .spell.is-avada {
        color: #9cff7d;
        background: linear-gradient(90deg, #f3ffe5 0%, #a8ff75 24%, #34ff54 52%, #cdfd8f 76%, #efffe3 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 12px rgba(125, 255, 58, 0.9), 0 0 34px rgba(42, 255, 88, 0.62), 0 0 70px rgba(0, 185, 55, 0.45);
        filter: drop-shadow(0 0 10px rgba(122, 255, 77, 0.6));
      }

      body.gestures-open canvas {
        left: 232px;
        right: auto;
        width: calc(100% - 232px);
      }

      body.gestures-open .spell {
        left: calc(232px + ((100% - 232px) / 2));
      }

      body.gestures-open .status,
      body.gestures-open .debug {
        left: 248px;
      }

      .spell-gesture-panel {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 1;
        display: none;
        flex-direction: column;
        width: 232px;
        height: 100%;
        color: rgba(255, 255, 255, 0.9);
        background: rgba(0, 0, 0, 0.76);
        border-right: 1px solid rgba(255, 255, 255, 0.16);
        font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body.gestures-open .spell-gesture-panel {
        display: flex;
      }

      .spell-gesture-header {
        flex: 0 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 6px;
        align-items: center;
        padding: 10px 10px 8px;
        background: rgba(0, 0, 0, 0.94);
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      .spell-gesture-title {
        color: #dff5ff;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: linear-gradient(90deg, #ffffff 0%, #d7b8ff 34%, #8ce8ff 72%, #ffffff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow: 0 0 16px rgba(116, 221, 255, 0.42), 0 0 26px rgba(190, 130, 255, 0.28);
        font-weight: 900;
        letter-spacing: 0;
        min-width: 0;
        white-space: nowrap;
        grid-column: 1 / -1;
        text-transform: uppercase;
        -webkit-text-fill-color: transparent;
      }

      .spell-gesture-title::before {
        content: "\1F56E";
        font-family: "Segoe UI Symbol", "Noto Sans Symbols", system-ui, sans-serif;
        font-size: 16px;
      }

      .spell-gesture-sort {
        min-width: 36px;
        min-height: 24px;
        padding: 0 8px;
        color: rgba(255, 255, 255, 0.82);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 5px;
        font: 800 11px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-transform: uppercase;
      }

      .spell-gesture-sort.is-active {
        color: #050505;
        background: linear-gradient(180deg, #ffffff, #cfd5dd);
        border-color: rgba(255, 255, 255, 0.72);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.22);
      }

      .spell-gesture-autoscroll {
        display: grid;
        grid-template-columns: auto auto;
        gap: 5px;
        align-items: center;
        justify-self: start;
        color: rgba(255, 255, 255, 0.74);
        font-size: 10px;
        white-space: nowrap;
        text-transform: uppercase;
      }

      .spell-gesture-options {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
      }

      .spell-gesture-option {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 30px;
        padding: 0 8px;
        color: rgba(255, 255, 255, 0.78);
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 6px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .spell-gesture-option:has(input:checked) {
        color: #eefbff;
        background: rgba(116, 221, 255, 0.16);
        border-color: rgba(116, 221, 255, 0.42);
        box-shadow: 0 0 14px rgba(116, 221, 255, 0.12);
      }

      .spell-gesture-option input,
      .spell-gesture-autoscroll input {
        width: 16px;
        height: 16px;
        accent-color: #74ddff;
      }

      .spell-gesture-list {
        flex: 1 1 auto;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        overflow: auto;
        padding: 10px;
        scrollbar-color: rgba(255, 255, 255, 0.24) rgba(0, 0, 0, 0.42);
        scrollbar-width: thin;
      }

      .spell-gesture-card {
        position: relative;
        display: grid;
        grid-template-rows: minmax(28px, auto) 1fr;
        min-height: 118px;
        padding: 8px;
        overflow: hidden;
        color: rgba(255, 255, 255, 0.88);
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        text-align: center;
      }

      .spell-gesture-card.has-path {
        cursor: pointer;
      }

      .spell-gesture-card.is-recent {
        animation: gesture-cast-glow 2.4s ease-out;
      }

      .spell-gesture-card.is-avada.is-recent {
        animation: gesture-avada-glow 2.8s cubic-bezier(0.18, 0.86, 0.28, 1);
      }

      @keyframes gesture-cast-glow {
        0% { box-shadow: inset 0 0 0 999px rgba(85, 195, 255, 0.2), 0 0 22px rgba(100, 215, 255, 0.68); }
        100% { box-shadow: inset 0 0 0 999px rgba(85, 195, 255, 0), 0 0 0 rgba(100, 215, 255, 0); }
      }

      @keyframes gesture-avada-glow {
        0% { box-shadow: inset 0 0 0 999px rgba(80, 255, 70, 0.12), 0 0 16px rgba(88, 255, 64, 0.44); border-color: rgba(150, 255, 108, 0.42); }
        42% { box-shadow: inset 0 0 0 999px rgba(80, 255, 70, 0.24), 0 0 34px rgba(88, 255, 64, 0.76); border-color: rgba(172, 255, 130, 0.72); }
        100% { box-shadow: inset 0 0 0 999px rgba(80, 255, 70, 0), 0 0 0 rgba(88, 255, 64, 0); border-color: rgba(255, 255, 255, 0.12); }
      }

      .spell-gesture-media {
        display: grid;
        place-items: center;
        min-height: 86px;
        overflow: hidden;
      }

      .spell-gesture-card img {
        width: min(156px, 100%);
        max-height: 92px;
        object-fit: contain;
      }

      .spell-gesture-card.is-missing-image .spell-gesture-media {
        color: rgba(255, 255, 255, 0.48);
        border: 1px dashed rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .spell-gesture-name {
        margin-bottom: 4px;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 11px;
        line-height: 1.12;
        overflow-wrap: anywhere;
        text-transform: uppercase;
      }

      .side-tool-rail {
        position: fixed;
        left: 0;
        top: 82px;
        z-index: 2;
        display: grid;
        gap: 6px;
        transition: left 220ms ease, bottom 220ms ease;
      }

      body.gestures-open .side-tool-rail {
        left: 232px;
      }

      .side-tool-button {
        display: grid;
        place-items: center;
        width: 36px;
        height: 42px;
        padding: 0;
        color: rgba(255, 255, 255, 0.82);
        background: rgba(0, 0, 0, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-left: 0;
        border-radius: 0 8px 8px 0;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
        transition: background 180ms ease, color 180ms ease, box-shadow 180ms ease;
      }

      .side-tool-button:hover,
      .side-tool-button.is-open {
        color: #ffffff;
        background: rgba(18, 22, 26, 0.92);
        box-shadow: 0 8px 26px rgba(0, 0, 0, 0.38), 0 0 18px rgba(255, 255, 255, 0.14);
      }

      .wand-connect-tab.is-connected {
        color: #9ee8ff;
      }

      body.hide-spell-book-tab .spell-book-tab,
      body.hide-wand-connect-tab .wand-connect-tab,
      body.play-mode .spell-book-tab,
      body.play-mode .wand-connect-tab,
      body.play-mode .wand-connect-panel,
      body.play-mode .spell-gesture-panel,
      body.play-mode .status,
      body.play-mode .debug,
      body.play-mode .spell {
        display: none !important;
      }

      .side-tool-symbol {
        font: 700 22px/1 "Segoe UI Symbol", "Noto Sans Symbols", system-ui, sans-serif;
        transform: translateY(-1px);
      }

      .wand-connect-panel {
        position: fixed;
        left: 44px;
        top: 82px;
        z-index: 2;
        display: grid;
        gap: 9px;
        width: 172px;
        padding: 10px;
        color: rgba(255, 255, 255, 0.88);
        background: rgba(0, 0, 0, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.34);
        transform: translateX(-130%);
        transition: left 220ms ease, transform 220ms ease, opacity 180ms ease;
        opacity: 0;
        pointer-events: none;
        font: 700 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-transform: uppercase;
        overflow: auto;
        scrollbar-color: rgba(255, 255, 255, 0.24) rgba(0, 0, 0, 0.42);
        scrollbar-width: thin;
      }

      .wand-connect-panel.is-open {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }

      body.gestures-open .wand-connect-panel {
        left: 276px;
      }

      .wand-connect-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .wand-connect-pill {
        position: relative;
        min-height: 34px;
        padding: 4px 6px 4px 10px;
        color: rgba(255, 255, 255, 0.76);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        cursor: pointer;
        transition: color 180ms ease, background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .wand-connect-pill.is-on {
        color: #dff8ff;
        background: rgba(116, 221, 255, 0.16);
        border-color: rgba(116, 221, 255, 0.45);
        box-shadow: 0 0 18px rgba(116, 221, 255, 0.14);
      }

      .wand-connect-pill.is-loading {
        border-color: rgba(255, 216, 80, 0.5);
      }

      .wand-connect-pill input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .wand-connect-switch {
        position: relative;
        flex: 0 0 auto;
        width: 44px;
        height: 24px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
        transition: background 180ms ease, box-shadow 180ms ease;
      }

      .wand-connect-switch::before {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        transition: transform 180ms ease, background 180ms ease;
      }

      .wand-connect-pill.is-on .wand-connect-switch {
        background: rgba(85, 219, 119, 0.46);
        box-shadow: inset 0 0 0 1px rgba(150, 255, 180, 0.32);
      }

      .wand-connect-pill.is-on .wand-connect-switch::before {
        transform: translateX(20px);
        background: #ffffff;
      }

      .wand-connect-status {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 11px;
      }

      .wand-connect-panel.is-connected .wand-connect-status {
        display: flex;
      }

      .wand-connect-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #e35050;
        box-shadow: 0 0 8px rgba(227, 80, 80, 0.55);
      }

      .wand-connect-dot.is-on {
        background: #55db77;
        box-shadow: 0 0 9px rgba(85, 219, 119, 0.62);
      }

      .wand-connect-loader {
        width: 12px;
        height: 12px;
        flex: 0 0 auto;
        border: 2px solid rgba(255, 255, 255, 0.22);
        border-top-color: rgba(116, 221, 255, 0.95);
        border-radius: 50%;
        animation: wand-connect-spin 820ms linear infinite;
      }

      .wand-connect-loader[hidden] {
        display: none;
      }

      @keyframes wand-connect-spin {
        to { transform: rotate(360deg); }
      }

      .wand-connected-details {
        display: none;
        gap: 8px;
      }

      .wand-connect-panel.is-connected .wand-connected-details {
        display: grid;
      }

      .wand-tracking-details {
        display: none;
        gap: 8px;
      }

      .wand-connect-panel.is-connected .wand-tracking-details {
        display: grid;
      }

      .wand-battery {
        color: rgba(255, 255, 255, 0.74);
        font-size: 11px;
      }

      .wand-calibration-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .wand-refresh-button {
        min-height: 30px;
        color: rgba(255, 255, 255, 0.86);
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        font: 800 11px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-transform: uppercase;
      }

      .wand-refresh-button:disabled {
        opacity: 0.45;
      }

      .wand-button-sensors {
        display: grid;
        gap: 5px;
      }

      .wand-button-sensor-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }

      .wand-button-sensor {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        min-height: 24px;
        color: rgba(255, 255, 255, 0.68);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 5px;
        font-size: 10px;
      }

      .wand-button-sensor.is-on {
        color: #dfffe6;
        background: rgba(85, 219, 119, 0.26);
        border-color: rgba(85, 219, 119, 0.76);
        box-shadow: 0 0 14px rgba(85, 219, 119, 0.26), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .debug {
        position: fixed;
        left: 16px;
        bottom: 14px;
        z-index: 1;
        color: rgba(255, 255, 255, 0.5);
        font: 11px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
        pointer-events: none;
        transition: left 220ms ease;
      }

      .draw-spells-drawer {
        position: fixed;
        right: 0;
        bottom: 14px;
        z-index: 2;
        display: flex;
        align-items: center;
        transition: transform 220ms ease;
      }

      .draw-spells-drawer.is-collapsed {
        transform: translateX(calc(100% - 34px));
      }

      .draw-spells-drawer.is-main-hidden,
      .overlay-hidden {
        display: none !important;
      }

      .draw-spells-tab {
        width: 34px;
        height: 42px;
        padding: 0;
        color: rgba(255, 255, 255, 0.88);
        background: rgba(0, 0, 0, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-right: 0;
        border-radius: 8px 0 0 8px;
        font: 700 18px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .draw-spells-toggle {
        display: flex;
        gap: 8px;
        align-items: center;
        min-height: 40px;
        padding: 0 12px 0 10px;
        color: rgba(255, 255, 255, 0.88);
        background: rgba(0, 0, 0, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-right: 0;
        border-radius: 8px 0 0 8px;
        font: 700 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-transform: uppercase;
      }

      .draw-spells-toggle input {
        width: 16px;
        height: 16px;
        accent-color: #ffd850;
      }

      #mcw-fluid-controls {
        position: fixed;
        right: 14px;
        top: 14px;
        z-index: 2;
        width: min(300px, calc(100vw - 28px));
        max-height: calc(100vh - 28px);
        overflow: auto;
        padding: 0 12px 12px;
        color: rgba(255, 255, 255, 0.86);
        background: rgba(0, 0, 0, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        scrollbar-color: rgba(255, 255, 255, 0.24) rgba(0, 0, 0, 0.42);
        scrollbar-width: thin;
      }

      #mcw-fluid-controls::-webkit-scrollbar {
        width: 9px;
      }

      #mcw-fluid-controls::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.42);
        border-radius: 8px;
      }

      #mcw-fluid-controls::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.24);
        border: 2px solid rgba(0, 0, 0, 0.72);
        border-radius: 8px;
      }

      #mcw-fluid-controls::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.36);
      }

      .fluid-controls-header {
        position: sticky;
        top: 0;
        z-index: 1;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        align-items: center;
        min-height: 42px;
        background: rgba(0, 0, 0, 0.92);
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        font-weight: 700;
        text-transform: uppercase;
      }

      .play-mode-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        color: rgba(255, 255, 255, 0.76);
        font: 800 10px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .play-mode-toggle input {
        width: 15px;
        height: 15px;
        accent-color: #74ddff;
      }

      .fluid-collapse-button {
        width: 24px;
        height: 24px;
        padding: 0;
        color: white;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 4px;
        font: 700 16px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #mcw-fluid-controls.is-collapsed {
        width: auto;
        padding: 2px;
      }

      #mcw-fluid-controls.is-collapsed .fluid-controls-header {
        display: block;
        min-height: 24px;
        background: transparent;
        border-bottom: 0;
      }

      #mcw-fluid-controls.is-collapsed .fluid-collapse-button {
        display: block;
      }

      #mcw-fluid-controls.is-collapsed .fluid-controls-header span {
        display: none;
      }

      #mcw-fluid-controls.is-collapsed .play-mode-toggle {
        display: none;
      }

      #mcw-fluid-controls.is-collapsed .fluid-controls-body {
        display: none;
      }

      body.play-mode #mcw-fluid-controls:not(.is-collapsed) .fluid-controls-body {
        display: none;
      }

      .fluid-control-section {
        --section-color: rgba(255, 255, 255, 0.55);
        margin-top: 10px;
        padding: 8px 8px 4px;
        border-left: 3px solid var(--section-color);
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
      }

      .fluid-control-section-title {
        margin-bottom: 6px;
        color: var(--section-color);
        font-weight: 700;
        text-transform: uppercase;
      }

      .fluid-control-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        align-items: center;
        margin: 8px 0;
      }

      .fluid-control-row input[type="range"] {
        grid-column: 1 / -1;
        width: 100%;
        accent-color: var(--section-color);
      }

      .fluid-control-row input[type="checkbox"],
      .fluid-control-row select {
        accent-color: var(--section-color);
      }

      .fluid-section-white .fluid-control-row input[type="checkbox"] {
        appearance: none;
        width: 16px;
        height: 16px;
        display: grid;
        place-items: center;
        background: white;
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: 3px;
      }

      .fluid-section-white .fluid-control-row input[type="checkbox"]::before {
        content: "";
        width: 9px;
        height: 5px;
        border-left: 2px solid #000;
        border-bottom: 2px solid #000;
        transform: rotate(-45deg) scale(0);
      }

      .fluid-section-white .fluid-control-row input[type="checkbox"]:checked::before {
        transform: rotate(-45deg) scale(1);
      }

      .fluid-control-row select {
        min-width: 116px;
        color: white;
        background: rgba(0, 0, 0, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
        padding: 4px 6px;
      }

      .fluid-control-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .fluid-section-grey { --section-color: #aeb4bd; }
      .fluid-section-blue { --section-color: #58a6ff; }
      .fluid-section-white { --section-color: #ffffff; }
      .fluid-section-green { --section-color: #46d779; }
      .fluid-section-yellow { --section-color: #f4d35e; }
      .fluid-section-extra { --section-color: #c5d1dc; }

      .fluid-control-actions button {
        flex: 1;
        min-height: 30px;
        color: white;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
      }

      @media (max-width: 720px) {

        body.gestures-open .status,

        .spell-gesture-panel {

        .spell-gesture-header {
          display: grid;
          grid-template-columns: 1fr auto auto;
          gap: 6px;
          align-items: center;
          padding: 6px 8px;

        .spell-gesture-sort {
          margin-bottom: 0;
        }

        .spell-gesture-autoscroll {
          grid-column: auto;
          grid-template-columns: auto auto;
          gap: 4px;
          justify-self: end;
          min-height: 24px;
          font-size: 9px;
        }

        .spell-gesture-title {
          margin-bottom: 0;
          white-space: nowrap;
          font-size: 11px;
        }

        .spell-gesture-options {
          grid-column: 1 / -1;
          grid-template-columns: 1fr 1fr;
          gap: 5px;
        }

        .spell-gesture-option {
          min-height: 24px;
          padding: 0 6px;
          font-size: 10px;
        }

        .spell-gesture-option input,
        .spell-gesture-autoscroll input {
          width: 14px;
          height: 14px;
        }

        .spell-gesture-list {
          grid-auto-flow: column;
          grid-auto-columns: 132px;
          grid-template-columns: none;
          overflow-x: auto;
          overflow-y: hidden;
          padding: 8px 10px 10px;
        }

        .spell-gesture-card {
          min-height: 104px;
          padding: 6px;
          grid-template-rows: minmax(30px, auto) 1fr;
        }

        .spell-gesture-card img {
          width: min(118px, 100%);
          max-height: 62px;
        }

        .spell-gesture-media {
          min-height: 62px;
        }

        .spell-gesture-name {
          font-size: 10px;
          line-height: 1.08;
        }

        .side-tool-rail {
          left: 10px;
          top: auto;
          bottom: 8px;
          grid-auto-flow: column;
          transform: none;
        }

        body.gestures-open .side-tool-rail {
          left: 10px;
          bottom: 232px;
        }

        .side-tool-button {
          width: 38px;
          height: 34px;
          border-left: 1px solid rgba(255, 255, 255, 0.18);
          border-radius: 8px;
        }

        .wand-connect-panel,
        body.gestures-open .wand-connect-panel {
          left: 10px;
          top: auto;
          bottom: 56px;
          width: min(198px, calc(100vw - 20px));
          max-height: min(360px, calc(100dvh - 74px));
          transform: translateY(130%);
        }

        .wand-connect-panel.is-open {
          transform: translateY(0);
        }

        body.gestures-open .wand-connect-panel {
          bottom: 276px;
          max-height: max(132px, calc(100dvh - 292px));
        }
      }

      @media (max-width: 520px) {
        .draw-spells-drawer:not(.is-collapsed) {
          flex-direction: column;
          align-items: flex-end;
        }

        .draw-spells-drawer:not(.is-collapsed) .draw-spells-tab {
          width: 32px;
          height: 28px;
        }

        .draw-spells-toggle {
          min-height: 32px;
        }

        .fluid-controls-header {
          grid-template-columns: 1fr auto auto;
          gap: 6px;
          min-height: 38px;
          font-size: 11px;
        }

        .play-mode-toggle {
          grid-column: auto;
          justify-self: auto;
          gap: 4px;
          font-size: 9px;
          white-space: nowrap;
        }

        .play-mode-toggle input {
          width: 13px;
          height: 13px;
        }
      }
