<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Magic Caster Wand Fluid Effects Canvas</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: fixed;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .status {
        position: fixed;
        left: 16px;
        top: 14px;
        z-index: 1;
        color: rgba(255, 255, 255, 0.72);
        font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
        pointer-events: none;
      }

      .spell {
        position: fixed;
        left: 50%;
        top: 18px;
        transform: translateX(-50%);
        z-index: 1;
        color: rgba(255, 216, 80, 0.95);
        font: 700 24px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 0 14px rgba(255, 180, 0, 0.55);
        pointer-events: none;
      }

      .debug {
        position: fixed;
        left: 16px;
        bottom: 14px;
        z-index: 1;
        color: rgba(255, 255, 255, 0.5);
        font: 11px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
        pointer-events: none;
      }
    </style>
    <script>
      window.MCW_FLUID_ENTRY_ID = __MCW_ENTRY_ID__;
      window.MCW_FLUID_EVENTS_URL = __MCW_EVENTS_URL__;
      window.MCW_FLUID_STATE_URL = __MCW_STATE_URL__;
      window.MCW_FLUID_CONFIG = __MCW_FLUID_CONFIG__;
    </script>
  </head>
  <body>
    <div class="status" id="mcw-fluid-status">READY</div>
    <div class="spell" id="mcw-fluid-spell"></div>
    <div class="debug" id="mcw-fluid-debug">WAITING FOR WAND DATA</div>
    <canvas></canvas>
    <script src="__MCW_STATIC_URL__/script.js"></script>
  </body>
</html>
