<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Magic Caster Wand Fluid Effects Canvas</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: fixed;
      }

      canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        transition: left 220ms ease, width 220ms ease, height 220ms ease, bottom 220ms ease;
      }

      .status {
        position: fixed;
        left: 16px;
        top: 14px;
        z-index: 1;
        color: rgba(255, 255, 255, 0.72);
        font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
        pointer-events: none;
      }

      .spell {
        position: fixed;
        left: 50%;
        top: 18px;
        transform: translateX(-50%);
        z-index: 1;
        color: #7ce7ff;
        background: linear-gradient(90deg, #d9fcff 0%, #74ddff 38%, #8bb6ff 70%, #f1fbff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        font: 700 24px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-align: center;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        text-shadow: 0 0 14px rgba(70, 190, 255, 0.58), 0 0 32px rgba(80, 120, 255, 0.32);
        pointer-events: none;
        transition: opacity 900ms ease;
      }

      .spell.is-cast-pulse {
        animation: spell-cast-pulse 760ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      @keyframes spell-cast-pulse {
        0% {
          transform: translateX(-50%) scale(1.09);
          filter: drop-shadow(0 0 16px rgba(120, 225, 255, 0.62));
        }
        100% {
          transform: translateX(-50%) scale(1);
          filter: drop-shadow(0 0 0 rgba(120, 225, 255, 0));
        }
      }

      .spell.is-learning {
        color: rgba(255, 216, 80, 0.95);
        background: none;
        -webkit-text-fill-color: rgba(255, 216, 80, 0.95);
        text-shadow: 0 0 14px rgba(255, 180, 0, 0.55);
      }

      body.gestures-open canvas {
        left: 232px;
        right: auto;
        width: calc(100% - 232px);
      }

      body.gestures-open .spell {
        left: calc(232px + ((100% - 232px) / 2));
      }

      .spell-gesture-panel {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 1;
        display: none;
        flex-direction: column;
        width: 232px;
        height: 100%;
        color: rgba(255, 255, 255, 0.9);
        background: rgba(0, 0, 0, 0.76);
        border-right: 1px solid rgba(255, 255, 255, 0.16);
        font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body.gestures-open .spell-gesture-panel {
        display: flex;
      }

      .spell-gesture-header {
        flex: 0 0 auto;
        padding: 10px 10px 8px;
        background: rgba(0, 0, 0, 0.94);
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      .spell-gesture-title {
        margin-bottom: 8px;
        color: rgba(255, 255, 255, 0.94);
        font-weight: 800;
        text-transform: uppercase;
      }

      .spell-gesture-sort {
        width: 100%;
        min-height: 26px;
        margin-bottom: 8px;
        color: rgba(255, 255, 255, 0.82);
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        font: 800 11px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-transform: uppercase;
      }

      .spell-gesture-autoscroll {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        color: rgba(255, 255, 255, 0.74);
        text-transform: uppercase;
      }

      .spell-gesture-list {
        flex: 1 1 auto;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        overflow: auto;
        padding: 10px;
        scrollbar-color: rgba(255, 255, 255, 0.24) rgba(0, 0, 0, 0.42);
        scrollbar-width: thin;
      }

      .spell-gesture-card {
        position: relative;
        min-height: 118px;
        padding: 8px;
        overflow: hidden;
        color: rgba(255, 255, 255, 0.88);
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        text-align: center;
      }

      .spell-gesture-card.is-recent {
        animation: gesture-cast-glow 2.4s ease-out;
      }

      @keyframes gesture-cast-glow {
        0% { box-shadow: inset 0 0 0 999px rgba(85, 195, 255, 0.2), 0 0 22px rgba(100, 215, 255, 0.68); }
        100% { box-shadow: inset 0 0 0 999px rgba(85, 195, 255, 0), 0 0 0 rgba(100, 215, 255, 0); }
      }

      .spell-gesture-media {
        display: grid;
        place-items: center;
        min-height: 82px;
      }

      .spell-gesture-card img {
        width: min(132px, 100%);
        height: 82px;
        object-fit: contain;
      }

      .spell-gesture-card.is-missing-image .spell-gesture-media {
        color: rgba(255, 255, 255, 0.48);
        border: 1px dashed rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .spell-gesture-name {
        margin-bottom: 4px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .debug {
        position: fixed;
        left: 16px;
        bottom: 14px;
        z-index: 1;
        color: rgba(255, 255, 255, 0.5);
        font: 11px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
        pointer-events: none;
      }

      .draw-spells-drawer {
        position: fixed;
        right: 0;
        bottom: 14px;
        z-index: 2;
        display: flex;
        align-items: center;
        transition: transform 220ms ease;
      }

      .draw-spells-drawer.is-collapsed {
        transform: translateX(calc(100% - 34px));
      }

      .draw-spells-drawer.is-main-hidden,
      .overlay-hidden {
        display: none !important;
      }

      .draw-spells-tab {
        width: 34px;
        height: 42px;
        padding: 0;
        color: rgba(255, 255, 255, 0.88);
        background: rgba(0, 0, 0, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-right: 0;
        border-radius: 8px 0 0 8px;
        font: 700 18px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .draw-spells-toggle {
        display: flex;
        gap: 8px;
        align-items: center;
        min-height: 40px;
        padding: 0 12px 0 10px;
        color: rgba(255, 255, 255, 0.88);
        background: rgba(0, 0, 0, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-right: 0;
        border-radius: 8px 0 0 8px;
        font: 700 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-transform: uppercase;
      }

      .draw-spells-toggle input {
        width: 16px;
        height: 16px;
        accent-color: #ffd850;
      }

      #mcw-fluid-controls {
        position: fixed;
        right: 14px;
        top: 14px;
        z-index: 2;
        width: min(300px, calc(100vw - 28px));
        max-height: calc(100vh - 28px);
        overflow: auto;
        padding: 0 12px 12px;
        color: rgba(255, 255, 255, 0.86);
        background: rgba(0, 0, 0, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        scrollbar-color: rgba(255, 255, 255, 0.24) rgba(0, 0, 0, 0.42);
        scrollbar-width: thin;
      }

      #mcw-fluid-controls::-webkit-scrollbar {
        width: 9px;
      }

      #mcw-fluid-controls::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.42);
        border-radius: 8px;
      }

      #mcw-fluid-controls::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.24);
        border: 2px solid rgba(0, 0, 0, 0.72);
        border-radius: 8px;
      }

      #mcw-fluid-controls::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.36);
      }

      .fluid-controls-header {
        position: sticky;
        top: 0;
        z-index: 1;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        min-height: 42px;
        background: rgba(0, 0, 0, 0.92);
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        font-weight: 700;
        text-transform: uppercase;
      }

      .fluid-collapse-button {
        width: 24px;
        height: 24px;
        padding: 0;
        color: white;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 4px;
        font: 700 16px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #mcw-fluid-controls.is-collapsed {
        width: auto;
        padding: 3px;
      }

      #mcw-fluid-controls.is-collapsed .fluid-controls-header {
        min-height: 24px;
        background: transparent;
        border-bottom: 0;
      }

      #mcw-fluid-controls.is-collapsed .fluid-controls-header span {
        display: none;
      }

      #mcw-fluid-controls.is-collapsed .fluid-controls-body {
        display: none;
      }

      .fluid-control-section {
        --section-color: rgba(255, 255, 255, 0.55);
        margin-top: 10px;
        padding: 8px 8px 4px;
        border-left: 3px solid var(--section-color);
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
      }

      .fluid-control-section-title {
        margin-bottom: 6px;
        color: var(--section-color);
        font-weight: 700;
        text-transform: uppercase;
      }

      .fluid-control-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        align-items: center;
        margin: 8px 0;
      }

      .fluid-control-row input[type="range"] {
        grid-column: 1 / -1;
        width: 100%;
        accent-color: var(--section-color);
      }

      .fluid-control-row input[type="checkbox"],
      .fluid-control-row select {
        accent-color: var(--section-color);
      }

      .fluid-section-white .fluid-control-row input[type="checkbox"] {
        appearance: none;
        width: 16px;
        height: 16px;
        display: grid;
        place-items: center;
        background: white;
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: 3px;
      }

      .fluid-section-white .fluid-control-row input[type="checkbox"]::before {
        content: "";
        width: 9px;
        height: 5px;
        border-left: 2px solid #000;
        border-bottom: 2px solid #000;
        transform: rotate(-45deg) scale(0);
      }

      .fluid-section-white .fluid-control-row input[type="checkbox"]:checked::before {
        transform: rotate(-45deg) scale(1);
      }

      .fluid-control-row select {
        min-width: 116px;
        color: white;
        background: rgba(0, 0, 0, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
        padding: 4px 6px;
      }

      .fluid-control-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .fluid-section-grey { --section-color: #aeb4bd; }
      .fluid-section-blue { --section-color: #58a6ff; }
      .fluid-section-white { --section-color: #ffffff; }
      .fluid-section-green { --section-color: #46d779; }
      .fluid-section-yellow { --section-color: #f4d35e; }
      .fluid-section-extra { --section-color: #c5d1dc; }

      .fluid-control-actions button {
        flex: 1;
        min-height: 30px;
        color: white;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
      }

      @media (max-width: 720px) {
        body.gestures-open canvas {
          left: 0;
          right: 0;
          bottom: 154px;
          width: 100%;
          height: calc(100% - 154px);
        }

        body.gestures-open .spell {
          left: 50%;
        }

        body.gestures-open .draw-spells-drawer {
          bottom: 160px;
        }

        .spell-gesture-panel {
          top: auto;
          bottom: 0;
          width: 100%;
          height: 154px;
          border-right: 0;
          border-top: 1px solid rgba(255, 255, 255, 0.16);
        }

        .spell-gesture-header {
          display: grid;
          grid-template-columns: 1fr auto auto;
          gap: 10px;
          align-items: center;
          padding: 7px 10px;
        }

        .spell-gesture-sort {
          width: auto;
          min-width: 68px;
          margin-bottom: 0;
          padding: 0 8px;
        }

        .spell-gesture-autoscroll {
          grid-template-columns: auto auto;
          justify-self: end;
        }

        .spell-gesture-title {
          margin-bottom: 0;
          white-space: nowrap;
        }

        .spell-gesture-list {
          grid-auto-flow: column;
          grid-auto-columns: 132px;
          grid-template-columns: none;
          overflow-x: auto;
          overflow-y: hidden;
          padding: 8px 10px 10px;
        }

        .spell-gesture-card {
          min-height: 82px;
          padding: 6px;
        }

        .spell-gesture-card img {
          height: 54px;
        }

        .spell-gesture-media {
          min-height: 54px;
        }
      }

      @media (max-width: 520px) {
        .draw-spells-drawer:not(.is-collapsed) {
          flex-direction: column;
          align-items: flex-end;
        }

        .draw-spells-drawer:not(.is-collapsed) .draw-spells-tab {
          width: 32px;
          height: 28px;
        }

        .draw-spells-toggle {
          min-height: 32px;
        }
      }
    </style>
    <script>
      window.MCW_FLUID_ENTRY_ID = __MCW_ENTRY_ID__;
      window.MCW_FLUID_EVENTS_URL = __MCW_EVENTS_URL__;
      window.MCW_FLUID_STATE_URL = __MCW_STATE_URL__;
      window.MCW_FLUID_CONFIG_URL = __MCW_CONFIG_URL__;
      window.MCW_FLUID_SPELL_URL = __MCW_SPELL_URL__;
      window.MCW_FLUID_DEFAULT_STATE_URL = "/magic_caster_wand_fluid/fluid_state";
      window.MCW_FLUID_CONFIG = __MCW_FLUID_CONFIG__;
      window.MCW_FLUID_GESTURES = __MCW_FLUID_GESTURES__;
    </script>
  </head>
  <body>
    <div class="status" id="mcw-fluid-status">READY</div>
    <div class="spell" id="mcw-fluid-spell"></div>
    <div class="debug" id="mcw-fluid-debug">WAITING FOR WAND DATA</div>
    <div class="draw-spells-drawer" id="mcw-draw-spells-drawer">
      <button type="button" class="draw-spells-tab" id="mcw-draw-spells-tab" title="Show or hide Cast Spells">&lt;</button>
      <label class="draw-spells-toggle" for="mcw-draw-spells">
        <span>Cast Spells</span>
        <input type="checkbox" id="mcw-draw-spells">
      </label>
      <label class="draw-spells-toggle" for="mcw-learn-spells">
        <span>Learn Spells</span>
        <input type="checkbox" id="mcw-learn-spells">
      </label>
      <label class="draw-spells-toggle" for="mcw-show-gestures">
        <span>Spell Book</span>
        <input type="checkbox" id="mcw-show-gestures">
      </label>
    </div>
    <aside class="spell-gesture-panel" id="mcw-spell-gesture-panel" aria-label="Spell book">
      <div class="spell-gesture-header">
        <div class="spell-gesture-title">Spell Book</div>
        <button type="button" class="spell-gesture-sort" id="mcw-spell-book-sort">A-Z</button>
        <label class="spell-gesture-autoscroll" for="mcw-gesture-autoscroll">
          <span>Auto Scroll</span>
          <input type="checkbox" id="mcw-gesture-autoscroll">
        </label>
      </div>
      <div class="spell-gesture-list" id="mcw-spell-gesture-list"></div>
    </aside>
    <canvas></canvas>
    <script src="__MCW_STATIC_URL__/script.js"></script>
  </body>
</html>
